<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form Example</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="card shadow-sm">
       
            <div class="card-header">
                <h2 class="h4 mb-0">Payment form example</h2>
            </div>
                <!--No se si hacia falta poner la caja roja con el texto pero entiendo que tiene que estar tal cual-->
            <div class="card-body">
             
                <div class="alert alert-danger" role="alert">
                    Some fields are missing.
                </div>

               
                <form class="row g-3">
                    
                 
                    <div class="col-md-5">
                        <label for="cardNumber" class="form-label">Card #</label>
                        <input type="text" class="form-control" id="cardNumber" placeholder="XXXXXXXXXXXXXXXX" required>
                    </div>
                    <div class="col-md-3">
                        <label for="cvc" class="form-label">CVC #</label>
                        <input type="text" class="form-control" id="cvc" placeholder="0000" required>
                    </div>
                    <div class="col-md-4">
                        <label for="amount" class="form-label">Amount</label>
                        <div class="input-group">
                            <span class="input-group-text fw-bold border-0 bg-transparent ps-0">$</span>
                            <input type="number" class="form-control" id="amount" placeholder="Amount" required>
                        </div>
                    </div>

                   
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>

                    
                    <div class="col-md-6">
                        <label for="city" class="form-label">City</label>
                        <input type="text" class="form-control" id="city" required>
                    </div>
                    <div class="col-md-3">
                        <label for="state" class="form-label">State</label>
                        <select id="state" class="form-select" required>
                            <option selected disabled value="">Pick a state</option>
                            <option>Spain</option>
                            <option>EEUU</option>
                            <option>England</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="zip" class="form-label">Postal Code</label>
                        <input type="text" class="form-control" id="zip" required>
                    </div>

              
                    <div class="col-md-6">
                        <label class="form-label d-block">We accept:</label>
                        <div class="bg-secondary p-2 rounded d-inline-flex text-white">
                            <div class="form-check form-check-inline mx-2">
                                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="mastercard" value="option1" checked>
                                <label class="form-check-label" for="mastercard"><i class="fa-brands fa-cc-mastercard"></i></label>
                            </div>
                            <div class="form-check form-check-inline mx-2">
                                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="visa" value="option2">
                                <label class="form-check-label" for="visa"><i class="fa-brands fa-cc-visa"></i></label>
                            </div>
                            <div class="form-check form-check-inline mx-2">
                                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="diners" value="option3">
                                <label class="form-check-label" for="diners"><i class="fa-brands fa-cc-diners-club"></i></label>
                            </div>
                            <div class="form-check form-check-inline mx-2">
                                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="amex" value="option4">
                                <label class="form-check-label" for="amex"><i class="fa-brands fa-cc-amex"></i></label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="3"></textarea>
                        <div class="form-text">Add any notes here.</div>
                    </div>

                </form>
            </div>

        
            <div class="card-footer d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>

  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
